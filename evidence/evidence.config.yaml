appearance:
  default: light
  switcher: false

theme:
  colorPalettes:
    default:
      light:
        - "#382c7c"   # GMV / revenue — deep purple
        - "#3a9d7e"   # on-time / positive — teal
        - "#eaa53e"   # warning / repeat flag — marigold
        - "#d35a3c"   # late / negative — coral
        - "#5b4bb5"   # seller / category — medium purple
        - "#bd8a93"   # CX labels — dusty rose
        - "#c9c3e8"   # neutral / secondary — lavender
        - "#2f7d8a"
        - "#caa15a"
        - "#9a7bbf"
      dark:
        - "#8a7fd6"
        - "#5fc3a3"
        - "#eaa53e"
        - "#e0795f"
        - "#8b7be0"
        - "#cfa3ab"
        - "#d6d0f0"
        - "#5fb5c0"
        - "#caa15a"
        - "#b79fe0"
  colorScales:
    default:
      light:
        - "#efe2d3"
        - "#382c7c"
      dark:
        - "#3a2f6a"
        - "#d6d0f0"
  colors:
    primary:
      light: "#382c7c"
      dark: "#8a7fd6"
    accent:
      light: "#bd8a93"
      dark: "#cfa3ab"
    base:
      light: "#faf4ed"
      dark: "#1a1726"
    info:
      light: "#5b4bb5"
      dark: "#8b7be0"
    positive:
      light: "#3a9d7e"
      dark: "#5fc3a3"
    warning:
      light: "#eaa53e"
      dark: "#eaa53e"
    negative:
      light: "#d35a3c"
      dark: "#e0795f"

plugins:
  components:
    "@evidence-dev/core-components": {}
  datasources:
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
