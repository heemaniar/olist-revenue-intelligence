version: 2

models:
  - name: int_order_items
    description: "Items aggregated to order grain (fan-out removed). GMV = sum(price)."
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: int_order_payments
    description: "Payments aggregated to order grain (fan-out removed)."
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: int_order_delivery
    description: "Per-order delivery timing and lateness (delivered orders only)."
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: int_order_reviews
    description: "One (latest) review per order."
    columns:
      - name: order_id
        tests: [unique, not_null]
